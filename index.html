<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background: #000;
  }

  /* 16:9 Aspect Ratio for Images */
  section {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #000;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Social Buttons - Gap Fixed */
  .social {
    padding: 50px 0; /* Adds space above and below buttons without the huge gap */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #000;
  }

  .social a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    margin: 10px;
    padding: 12px 25px;
    border: 1px solid white;
    border-radius: 30px;
    font-family: Arial, sans-serif;
    width: 180px;
    text-align: center;
  }
</style>
</head>

<body>

<section><img src="./1.jpg"></section>
<section><img src="./2.jpg"></section>
<section><img src="./3.jpg"></section>
<section><img src="./4.jpg"></section>

<div class="social">
  <a href="https://www.instagram.com/amalk6ishna">Instagram</a>
  <a href="https://youtube.com/@amalk6ishna">YouTube</a>
  <a href="https://wa.me/message/WXOHDIKU4JZXJ1">WhatsApp</a>
</div>

</body>
</html>
