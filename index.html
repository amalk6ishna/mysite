<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background: #000; /* Keeps the background dark */
  }

  /* Force 16:9 Aspect Ratio */
  section {
    width: 100%;
    aspect-ratio: 16 / 9; /* This ensures the 16:9 shape */
    overflow: hidden;
  }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ensures the image fills the 16:9 area */
    display: block;
  }

  /* social buttons */
  .social {
    height: 100vh;
    display: flex;
    flex-direction: column; /* Stack buttons vertically for better mobile fit */
    justify-content: center;
    align-items: center;
    background: #000;
  }

  .social a {
    color: white;
    text-decoration: none;
    font-size: 20px;
    margin: 10px;
    padding: 12px 25px;
    border: 1px solid white;
    border-radius: 30px;
    font-family: Arial, sans-serif;
    width: 200px; /* Uniform button width */
    text-align: center;
  }
</style>
</head>

<body>

<section><img src="./1.jpg"></section>
<section><img src="./2.jpg"></section>
<section><img src="./3.jpg"></section>
<section><img src="./4.jpg"></section>

<div class="social">
  <a href="https://www.instagram.com/amalk6ishna">Instagram</a>
  <a href="https://youtube.com/@amalk6ishna">YouTube</a>
  <a href="https://wa.me/message/WXOHDIKU4JZXJ1">WhatsApp</a>
</div>

</body>
</html>
